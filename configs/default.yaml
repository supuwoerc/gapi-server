# 基础配置 - 所有环境共享，环境特定配置在 dev.yaml/prod.yaml 中覆盖

server:
  host: "0.0.0.0"             # 监听地址
  port: 8080                  # 监听端口
  max_multipart_memory: 32    # 文件上传内存限制 (MB)

database:
  host: "127.0.0.1"           # 数据库主机地址
  port: 3306                  # 数据库端口
  user: "root"                # 数据库用户名
  password: "password"            # 数据库密码
  dbname: "gapi"              # 数据库名称
  max_idle_conns: 10          # 连接池最大空闲连接数
  max_open_conns: 100         # 连接池最大打开连接数
  conn_max_lifetime: 3600            # 连接最大存活时间 (单位: 秒, 3600 = 1h)
  slow_threshold: 200               # 慢查询阈值 (单位: 毫秒, 200 = 200ms)
  log_level: 2                # GORM 日志级别 (1=Silent 2=Error 3=Warn 4=Info)

log:
  level: "info"               # 日志级别 (debug/info/warn/error)
  dir: "./logs"               # 日志文件存放目录, 为空时默认在项目目录下创建 log 目录
  stdout: true                # 是否同时输出到控制台
  max_size: 100               # 单个日志文件最大大小 (MB)
  max_backups: 5              # 保留的旧日志文件最大数量
  max_age: 30                 # 保留的旧日志文件最大天数

cors:
  origin_prefixes:               # 允许的 Origin 前缀
    - "http://localhost"

rate_limit:
  pattern: "100-M"               # 限流模式 (100次/分钟)
  prefix: "gapi_limiter"         # Redis key 前缀

redis:
  addr: "127.0.0.1:6379"         # Redis 地址
  password: ""                   # Redis 密码
  db: 0                          # Redis 数据库编号
  log_level: 2                   # Redis 日志级别 (1=Silent 2=Error 3=Warn 4=Info)
  maint_notifications: "auto"    # maint_notifications 模式 (disabled/enabled/auto)

locale:
  default_lang: "cn"             # 默认语言 (cn/en)
  locale_key: "Locale"           # 从 Header 中读取语言的 key

cron:
  enabled: true                  # 是否启用定时任务
  shutdown_timeout: 30           # 关闭时等待运行中任务的超时时间 (秒)

jwt:
  secret: ""                         # JWT 签名密钥 (生产环境必须通过 etcd 注入)
  access_token_expiry: 15            # access_token 有效期 (分钟)
  refresh_token_expiry: 168          # refresh_token 有效期 (小时, 168 = 7天)
  issuer: "gapi-server"             # 签发者

etcd:
  endpoints:                     # etcd 节点地址列表
    - "127.0.0.1:2379"
  username: ""                   # 用户名
  password: ""                   # 密码
  dial_timeout: 5                # 连接超时 (秒)
  dyn_config:
    enabled: true                # 是否启用远程配置
    key: "/gapi/config/app.yaml" # etcd 中存储完整 YAML 的 key
  registry:
    enabled: true                # 是否启用服务注册
    service_name: "gapi-server"  # 注册的服务名
    ttl: 10                      # 租约 TTL (秒)
    prefix: "/gapi/services"     # key 前缀
    weight: 100                  # 实例权重
  discovery:
    prefixes:                    # 要监听的 prefix 列表
      - "/gapi/services"
