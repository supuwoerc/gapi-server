server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "root"
  dbname: "gapi"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600000000000  # 1h in nanoseconds
  slow_threshold: 200000000         # 200ms in nanoseconds
  log_level: 2                      # 1=Silent 2=Error 3=Warn 4=Info

log:
  level: "info"
  dir: "./logs"
  stdout: true
  max_size: 100       # megabytes
  max_backups: 5
  max_age: 30         # days
